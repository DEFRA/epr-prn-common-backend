version: 2

updates:
  - package-ecosystem: nuget
    directory: "/src"
    open-pull-requests-limit: 10
    schedule:
      interval: daily
      time: '10:30'
      timezone: 'Europe/London'
    ignore:
      # Should we update the target framework of projects in the future, these
      # ignores will also need to change
      - dependency-name: "HealthChecks.SqlServer"
        versions: [">=9.0.0"]
      - dependency-name: "HealthChecks.UI.Client"
        versions: [">=9.0.0"]
      - dependency-name: "coverlet.*"
        versions: [">=8.0.0"]
      - dependency-name: "MediatR"
        versions: [">=14.0.0"]
      - dependency-name: "Microsoft.AspNetCore.*"
        versions: [">=9.0.0"]
      - dependency-name: "Microsoft.EntityFrameworkCore*"
        versions: [">=9.0.0"]
      - dependency-name: "Microsoft.Extensions.*"
        versions: [">=9.0.0"]
      - dependency-name: "Moq.EntityFrameworkCore"
        versions: [">=9.0.0"]
      - dependency-name: "Swashbuckle.AspNetCore*"
        versions: [">=9.0.0"]
      - dependency-name: "System.Formats.Asn1"
        versions: [">=9.0.0"]
    groups:
      # Group all patch updates into a single PR
      patch-updates:
        applies-to: version-updates
        update-types:
          - 'patch'
      # Minor updates will be created individually (ungrouped)
      # Major updates will be created individually (ungrouped)
      # No specific configuration needed for major updates as they'll be handled separately
